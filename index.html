<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Football Pro</title>
  <meta name="description" content="Your personal football training companion">
  <meta name="theme-color" content="#7C3AED">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FootPro">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app">
    <div id="splash" class="splash">
      <div class="splash-ball">⚽</div>
      <h1>Football Pro</h1>
      <p>Your training companion</p>
    </div>

    <header id="app-header" class="app-header hidden">
      <button id="back-btn" class="back-btn hidden">←</button>
      <h1 id="page-title" class="page-title"></h1>
      <div class="header-right"></div>
    </header>

    <main id="page-content" class="page-content hidden"></main>

    <nav id="bottom-nav" class="bottom-nav hidden">
      <button class="nav-item active" data-page="home">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-item" data-page="planner">
        <span class="nav-icon">📅</span>
        <span class="nav-label">Plan</span>
      </button>
      <div class="nav-fab-wrapper">
        <button class="nav-fab" id="quick-log-btn" title="Log session">
          <span class="fab-icon">+</span>
        </button>
      </div>
      <button class="nav-item" data-page="progress">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Progress</span>
      </button>
      <button class="nav-item" data-page="badges_page">
        <span class="nav-icon">⭐</span>
        <span class="nav-label">Badges</span>
      </button>
    </nav>
  </div>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-sheet" class="modal-sheet">
      <div class="modal-handle"></div>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
